<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Spin & Win | Luxury Gaming Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Immersive Background Layers -->
    <canvas id="canvas-bg"></canvas>
    <div class="hero-mesh"></div>
    <div class="cyber-grid"></div>

    <!-- Luxury Gaming Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="assets/logo.PNG" alt="Logo" class="logo-img">
            </div>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-container" title="Toggle Aesthetic">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button id="sound-toggle" class="icon-container" title="Sound Control">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container" id="main-container">
            
            <!-- Stage 1: Lead Capture -->
            <section id="lead-capture" class="glass-card entrance-anim">
                <div class="header-group">
                    <span class="eyebrow">Exclusive Access</span>
                    <h1>Spin <span class="title-accent">&</span> Win</h1>
                    <p class="subtitle">Deploy your email to unlock legendary rewards and digital assets.</p>
                </div>

                <form id="spin-form" class="luxury-form">
                    <div class="input-wrapper">
                        <input type="email" id="email" placeholder="ENTER PLAYER EMAIL" required>
                    </div>
                    <button type="submit" class="btn-cyber">
                        Initialize Spin
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </form>
            </section>

            <!-- Stage 2: The Arena (Wheel + Stats) -->
            <section id="wheel-wrapper" class="arena-layout">
                <!-- Wheel Side (Top on Mobile) -->
                <div class="glass-card wheel-section stagger-1">
                    <div class="wheel-arena">
                        <div class="wheel-outer-ring"></div>
                        <div class="wheel-pointer">
                            <svg width="30" height="40" viewBox="0 0 30 40" fill="none">
                                <path d="M15 40L0 10C0 10 0 0 15 0C30 0 30 10 30 10L15 40Z" fill="#fff"/>
                                <path d="M15 30L5 10C5 10 5 4 15 4C25 4 25 10 25 10L15 30Z" fill="var(--primary)"/>
                            </svg>
                        </div>
                        <div class="wheel-center-luxury"></div>
                        <canvas id="wheel" width="720" height="720"></canvas>
                    </div>

                    <button id="spin-btn" class="btn-cyber spin-main-btn">
                        EXECUTE SPIN
                    </button>
                </div>

                <!-- Info Side (Bottom on Mobile) -->
                <div class="info-section">
                    <div class="stats-grid stagger-2">
                        <div class="stat-card">
                            <span class="stat-label">TENTATIVES</span>
                            <span class="stat-value" id="spins-left">1</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-label">Legendary Wins</span>
                            <span class="stat-value" id="total-wins">0</span>
                        </div>
                    </div>

                    <div class="glass-card history-card stagger-3">
                        <h3 class="bento-title">Recent Activity</h3>
                        <ul id="win-history" class="history-list-gaming">
                            <!-- History items added via JS -->
                        </ul>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Reward Arena Modal -->
    <div class="modal-overlay" id="reward-modal">
        <div class="reward-card reward-modal-gaming" id="reward-card">
            <span class="reward-icon" id="reward-emoji">💎</span>
            <h2 class="win-banner" id="reward-title">VICTORY</h2>
            <p id="reward-desc">Your legendary loot code has been generated:</p>
            
            <div class="coupon-container">
                <div class="coupon-cyber" id="coupon-code">LFG-99X</div>
                <button id="copy-btn" class="btn-copy" title="Copy Code">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>

            <button class="btn-cyber" id="close-modal">CLAIM LOOT</button>

            <div id="claim-success" class="success-msg">LOOT SECURED</div>

            <div id="gift-section" class="gift-area">
                <button id="show-gift-form" class="btn-text">Transfer loot to friend</button>
                <div id="gift-form-container" class="gift-form-hidden">
                    <input type="email" id="friend-email" placeholder="RECIPIENT EMAIL" class="minimal-input">
                    <button id="send-gift-btn" class="btn-cyber btn-small">INITIATE TRANSFER</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <p class="copyright">© 2026 PREMIUM SPIN created with Neosafi by care</p>
        </div>
    </footer>

    <script src="compatibility.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
